<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Americas Hover Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/grid.css"/>
  <link rel="stylesheet" href="css/bootstrap-grid.css"/>
  <script src="js/bootstrap.bundle.min.js"></script>
  <style>
    body { background-color: #f4f7fb; }
    .map-object-wrap {
      position: relative;
    }
    .map-object-wrap object,
    .map-object-wrap #inline-svg {
      display: block;
      width: 100%;
      height: 78vh;
      min-height: 560px;
      border: 0;
      background: #fff;
    }
    @media (max-width: 900px) {
      .map-object-wrap object,
      .map-object-wrap #inline-svg { height: 64vh; min-height: 460px; }
    }
    .map-corner-photos {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }
    .corner-slot {
      position: absolute;
      width: 120px;
      height: 90px;
      overflow: hidden;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.2);
      background: rgba(255, 255, 255, 0.85);
    }
    .corner-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .corner-slot--tl { top: 8px; left: 8px; }
    .corner-slot--tr { top: 8px; right: 8px; }
    .corner-slot--bl { bottom: 8px; left: 8px; }
    .corner-slot--br { bottom: 8px; right: 8px; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="row mb-3">
      <div class="col">
        <h1 class="h3 mb-1">Americas Map</h1>
        <p class="text-muted small mb-0">Click the Caribbean highlight or any country to zoom. Click ocean to reset.</p>
      </div>
    </div>
    <div class="row g-3">
      <div class="col-md-4">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h2 class="card-title h6 text-uppercase text-muted mb-2">Country Info</h2>
            <p id="country-readout" class="fw-semibold mb-2">Hover a country...</p>
            <p id="country-details" class="mb-0 small text-secondary">Move your cursor over the map to display country information here.</p>
          </div>
        </div>
      </div>
      <div class="col-md-8">
        <div class="card shadow-sm h-100 map-card">
          <div class="card-body p-0 map-object-wrap">
            <object id="map-object" data="images/SVG/americas-political.svg" type="image/svg+xml" aria-label="Americas map"></object>
            <div id="map-corner-photos" class="map-corner-photos" aria-hidden="true">
              <div class="corner-slot corner-slot--tl" data-corner="top-left"></div>
              <div class="corner-slot corner-slot--tr" data-corner="top-right"></div>
              <div class="corner-slot corner-slot--bl" data-corner="bottom-left"></div>
              <div class="corner-slot corner-slot--br" data-corner="bottom-right"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const mapObject = document.getElementById("map-object");
    const readout = document.getElementById("country-readout");
    const details = document.getElementById("country-details");

    const DETAILS_BASE = "data/americas-map";
    const CORNER_SLOTS = ["top-left", "top-right", "bottom-left", "bottom-right"];
    const countryDetailsCache = new Map();
    let detailsPathById = null;

    function clearCornerPhotos() {
      var overlay = document.getElementById("map-corner-photos");
      if (!overlay) return;
      overlay.querySelectorAll("[data-corner]").forEach(function (slot) { slot.innerHTML = ""; });
    }

    function ensureCornerOverlay(container) {
      if (!container) return null;
      var existing = container.querySelector("#map-corner-photos");
      if (existing) return existing;
      var wrap = document.createElement("div");
      wrap.id = "map-corner-photos";
      wrap.className = "map-corner-photos";
      wrap.setAttribute("aria-hidden", "true");
      [["tl", "top-left"], ["tr", "top-right"], ["bl", "bottom-left"], ["br", "bottom-right"]].forEach(function (pair) {
        var d = document.createElement("div");
        d.className = "corner-slot corner-slot--" + pair[0];
        d.setAttribute("data-corner", pair[1]);
        wrap.appendChild(d);
      });
      container.appendChild(wrap);
      return wrap;
    }

    async function fetchDetailsPathIndex() {
      if (detailsPathById !== null) return detailsPathById;
      try {
        var r = await fetch(DETAILS_BASE + "/country-details/by-id.json", { cache: "force-cache" });
        if (r.ok) detailsPathById = await r.json();
        else detailsPathById = {};
      } catch (e) {
        detailsPathById = {};
      }
      return detailsPathById;
    }

    function normalizeCountryDetails(json) {
      var out = {
        title: typeof json.title === "string" ? json.title : "",
        description: typeof json.description === "string" ? json.description : "",
        photosByCorner: {},
        fallback: false
      };
      var pbc = json.photosByCorner && typeof json.photosByCorner === "object" ? json.photosByCorner : {};
      CORNER_SLOTS.forEach(function (s) {
        var ph = pbc[s];
        out.photosByCorner[s] = ph && ph.src ? { src: ph.src, alt: typeof ph.alt === "string" ? ph.alt : "" } : null;
      });
      return out;
    }

    async function loadCountryDetails(svgId) {
      if (!svgId || svgId === "caribbean") {
        return { fallback: true };
      }
      if (countryDetailsCache.has(svgId)) return countryDetailsCache.get(svgId);
      var promise = (async function () {
        async function tryFetch(relPath) {
          try {
            var r = await fetch(DETAILS_BASE + "/country-details/" + relPath, { cache: "force-cache" });
            if (!r.ok) return null;
            return await r.json();
          } catch (e) {
            return null;
          }
        }
        var raw = await tryFetch(svgId + ".json");
        if (!raw) {
          var idx = await fetchDetailsPathIndex();
          var nested = idx[svgId];
          if (nested) raw = await tryFetch(nested);
        }
        if (!raw || typeof raw !== "object") {
          return { fallback: true };
        }
        try {
          return normalizeCountryDetails(raw);
        } catch (e) {
          return { fallback: true };
        }
      })();
      countryDetailsCache.set(svgId, promise);
      return promise;
    }

    function applyCountryDetailsToUi(pathEl, data) {
      var name = pathEl.getAttribute("data-name") || pathEl.id || "?";
      var overlay = document.getElementById("map-corner-photos");
      if (data.fallback) {
        readout.textContent = "Country: " + name;
        details.textContent = "Click again to reset zoom.";
        clearCornerPhotos();
        return;
      }
      readout.textContent = data.title || name;
      details.textContent = data.description || "Click again to reset zoom.";
      if (!overlay) return;
      CORNER_SLOTS.forEach(function (slot) {
        var slotEl = overlay.querySelector("[data-corner=\"" + slot + "\"]");
        if (!slotEl) return;
        slotEl.innerHTML = "";
        var ph = data.photosByCorner[slot];
        if (ph && ph.src) {
          var img = document.createElement("img");
          img.src = ph.src;
          img.alt = ph.alt || "";
          slotEl.appendChild(img);
        }
      });
    }

    function enhanceSvg(svgRoot) {
      let selectedZoomId = null;
      let hoveredCountryId = null;
      let hoveredHotspot = false;
      let readoutSyncScheduled = false;
      const vb = svgRoot.viewBox.baseVal;
      const baseViewBox = { x: vb.x, y: vb.y, width: vb.width, height: vb.height };

      function setViewBox(box) {
        svgRoot.setAttribute("viewBox", box.x.toFixed(3) + " " + box.y.toFixed(3) + " " + box.width.toFixed(3) + " " + box.height.toFixed(3));
      }
      function animateViewBox(target, duration) {
        duration = duration || 280;
        const s = svgRoot.viewBox.baseVal;
        const from = { x: s.x, y: s.y, width: s.width, height: s.height };
        const t0 = performance.now();
        function step(ts) {
          const t = Math.min(1, (ts - t0) / duration);
          const e = 1 - Math.pow(1 - t, 3);
          setViewBox({
            x: from.x + (target.x - from.x) * e,
            y: from.y + (target.y - from.y) * e,
            width: from.width + (target.width - from.width) * e,
            height: from.height + (target.height - from.height) * e
          });
          if (t < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }
      function fitAspect(box) {
        var r = baseViewBox.width / baseViewBox.height;
        var br = box.width / box.height;
        if (br > r) {
          var need = box.width / r;
          var g = need - box.height;
          box.y -= g / 2;
          box.height = need;
        } else {
          var need2 = box.height * r;
          var g2 = need2 - box.width;
          box.x -= g2 / 2;
          box.width = need2;
        }
        return box;
      }
      /** pad: inset around bbox in SVG units. tighten: multiply viewBox size by this (smaller = zoom in more). */
      function zoomToElement(el, pad, tighten) {
        var b = el.getBBox();
        var p = pad == null ? 24 : pad;
        var box = fitAspect({ x: b.x - p, y: b.y - p, width: b.width + p * 2, height: b.height + p * 2 });
        var t = tighten == null ? 1 : tighten;
        if (t < 1 && t > 0) {
          var cx = box.x + box.width / 2;
          var cy = box.y + box.height / 2;
          box.width *= t;
          box.height *= t;
          box.x = cx - box.width / 2;
          box.y = cy - box.height / 2;
        }
        animateViewBox(box);
      }

      function bringToFront(el) {
        if (!el || !el.parentNode) return;
        // Move the element to the end of its parent so it renders above neighbors.
        el.parentNode.appendChild(el);
      }

      var hotspot = svgRoot.querySelector("#caribbean-hotspot");
      function hotspotPointer(on) {
        if (hotspot) hotspot.setAttribute("pointer-events", on ? "all" : "none");
      }
      function resetZoom() {
        selectedZoomId = null;
        clearCornerPhotos();
        svgRoot.querySelectorAll(".country.is-selected").forEach(function (n) { n.classList.remove("is-selected"); });
        if (hotspot) hotspot.classList.remove("is-selected");
        hotspotPointer(true);
        animateViewBox(baseViewBox);
      }

      function showHoverLineForCountry(c) {
        var name = c.getAttribute("data-name") || c.id || "?";
        var sub = c.getAttribute("data-subregion");
        readout.textContent = "Country: " + name;
        details.textContent = sub ? "ID: " + (c.id || "N/A") + " | " + name + " | US: " + sub : "ID: " + (c.id || "N/A") + " | " + name;
      }

      function scheduleSyncReadout() {
        if (readoutSyncScheduled) return;
        readoutSyncScheduled = true;
        queueMicrotask(function () {
          readoutSyncScheduled = false;
          syncReadoutPanel();
        });
      }

      function syncReadoutPanel() {
        if (selectedZoomId === "caribbean") {
          readout.textContent = "Caribbean (zoomed)";
          details.textContent = "Hover or click countries and islands. Click ocean to zoom out.";
          return;
        }
        if (!selectedZoomId) {
          if (hoveredHotspot) {
            readout.textContent = "Caribbean region";
            details.textContent = "Click to zoom (same image, viewBox only).";
            return;
          }
          if (hoveredCountryId) {
            var hc = svgRoot.getElementById(hoveredCountryId);
            if (hc && hc.classList.contains("country")) {
              showHoverLineForCountry(hc);
              return;
            }
          }
          readout.textContent = "Hover a country...";
          details.textContent = "Move your cursor over the map.";
          return;
        }
        var selId = selectedZoomId;
        var selEl = svgRoot.getElementById(selId);
        if (!selEl || !selEl.classList.contains("country")) {
          readout.textContent = "Hover a country...";
          details.textContent = "Move your cursor over the map.";
          return;
        }
        if (hoveredCountryId && hoveredCountryId !== selId) {
          var hEl = svgRoot.getElementById(hoveredCountryId);
          if (hEl && hEl.classList.contains("country")) {
            clearCornerPhotos();
            showHoverLineForCountry(hEl);
            return;
          }
        }
        loadCountryDetails(selId).then(function (data) {
          if (selectedZoomId !== selId) return;
          if (hoveredCountryId && hoveredCountryId !== selId) return;
          applyCountryDetailsToUi(selEl, data);
        });
      }

      var st = svgRoot.ownerDocument.createElementNS("http://www.w3.org/2000/svg", "style");
      st.textContent = ".country{transition:fill 120ms,stroke-width 120ms;cursor:pointer}" +
        ".country-us-subregion[data-subregion=contiguous]{fill:#9fb8d1!important}" +
        ".country-us-subregion[data-subregion=alaska]{fill:#9fd1b6!important}" +
        ".country-us-subregion[data-subregion=hawaii]{fill:#d4b7e8!important}" +
        ".country:hover,.country.is-hovered{fill:#ffb347!important;stroke:#1e2a44!important;stroke-width:1.4!important}" +
        ".country.is-selected{fill:#ff9a2f!important;stroke:#0e1a2e!important;stroke-width:1.6!important}";
      svgRoot.appendChild(st);

      if (hotspot) {
        hotspot.addEventListener("mouseenter", function () {
          if (selectedZoomId) return;
          bringToFront(hotspot);
          hoveredHotspot = true;
          scheduleSyncReadout();
        });
        hotspot.addEventListener("mouseleave", function () {
          if (selectedZoomId) return;
          hoveredHotspot = false;
          scheduleSyncReadout();
        });
        hotspot.addEventListener("click", function (ev) {
          ev.stopPropagation();
          if (selectedZoomId === "caribbean") {
            resetZoom();
            scheduleSyncReadout();
            return;
          }
          clearCornerPhotos();
          hoveredHotspot = false;
          selectedZoomId = "caribbean";
          svgRoot.querySelectorAll(".country.is-selected").forEach(function (n) { n.classList.remove("is-selected"); });
          bringToFront(hotspot);
          hotspot.classList.add("is-selected");
          zoomToElement(hotspot, 42, 0.55);
          hotspotPointer(false);
          scheduleSyncReadout();
        });
      }

      var countries = svgRoot.querySelectorAll(".country");
      if (!countries.length) {
        readout.textContent = "No country paths in SVG.";
        return;
      }

      function onCountryEnter(c) {
        bringToFront(c);
        c.classList.add("is-hovered");
        hoveredCountryId = c.id;
        scheduleSyncReadout();
      }
      function onCountryLeave(c) {
        c.classList.remove("is-hovered");
        if (hoveredCountryId === c.id) hoveredCountryId = null;
        scheduleSyncReadout();
      }
      function onCountryClick(c, ev) {
        ev.stopPropagation();
        if (selectedZoomId === c.id) {
          resetZoom();
          scheduleSyncReadout();
          return;
        }
        hoveredHotspot = false;
        selectedZoomId = c.id;
        svgRoot.querySelectorAll(".country.is-selected").forEach(function (n) { n.classList.remove("is-selected"); });
        bringToFront(c);
        c.classList.add("is-selected");
        if (hotspot) {
          hotspot.classList.remove("is-selected");
          // When zoomed on a country, don't let the hotspot sit on top of countries.
          hotspotPointer(false);
        }
        zoomToElement(c, 24);
        scheduleSyncReadout();
      }

      countries.forEach(function (c) {
        c.addEventListener("mouseenter", function () { onCountryEnter(c); });
        c.addEventListener("mouseleave", function () { onCountryLeave(c); });
        c.addEventListener("click", function (ev) { onCountryClick(c, ev); });
      });

      svgRoot.addEventListener("click", function (ev) {
        if (ev.target.closest && ev.target.closest(".map-hotspot")) return;
        if (!ev.target.closest || !ev.target.closest(".country")) {
          resetZoom();
          scheduleSyncReadout();
        }
      });
      readout.textContent = "Hover a country...";
      details.textContent = "Move your cursor over the map.";
    }

    async function inlineFallback() {
      try {
        var r = await fetch("images/SVG/americas-political.svg", { cache: "no-store" });
        if (!r.ok) throw new Error(String(r.status));
        var wrap = mapObject.parentElement;
        wrap.innerHTML = '<div id="inline-svg" style="width:100%;height:78vh;min-height:560px">' + (await r.text()) + "</div>";
        ensureCornerOverlay(wrap);
        var root = wrap.querySelector("svg");
        if (!root) throw new Error("no svg");
        root.setAttribute("width", "100%");
        root.setAttribute("height", "100%");
        root.setAttribute("preserveAspectRatio", "xMidYMid meet");
        enhanceSvg(root);
      } catch (e) {
        readout.textContent = "Serve over http:// (not file://) for map interactivity.";
      }
    }

    if (location.protocol === "file:") {
      readout.textContent = "Use a local server: python3 -m http.server 8000";
    }
    mapObject.addEventListener("load", function () {
      var root = mapObject.contentDocument && mapObject.contentDocument.documentElement;
      if (!root) { inlineFallback(); return; }
      enhanceSvg(root);
    });
    mapObject.addEventListener("error", inlineFallback);
  </script>
</body>
</html>
