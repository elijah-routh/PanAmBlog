<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Americas Hover Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/grid.css"/>
  <link rel="stylesheet" href="css/bootstrap-grid.css"/>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/svg-political-map.js"></script>
  <style>
    body { background-color: #f4f7fb; }
    .map-object-wrap {
      position: relative;
    }
    .map-object-wrap object,
    .map-object-wrap #inline-svg {
      display: block;
      width: 100%;
      height: 78vh;
      min-height: 560px;
      border: 0;
      background: #fff;
    }
    @media (max-width: 900px) {
      .map-object-wrap object,
      .map-object-wrap #inline-svg { height: 64vh; min-height: 460px; }
    }
    .map-corner-photos {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }
    .corner-slot {
      position: absolute;
      width: 120px;
      height: 90px;
      overflow: hidden;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.2);
      background: rgba(255, 255, 255, 0.85);
    }
    .corner-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .corner-slot--tl { top: 8px; left: 8px; }
    .corner-slot--tr { top: 8px; right: 8px; }
    .corner-slot--bl { bottom: 8px; left: 8px; }
    .corner-slot--br { bottom: 8px; right: 8px; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="row mb-3">
      <div class="col">
        <h1 class="h3 mb-1">Americas Map</h1>
        <p class="text-muted small mb-0">Click the Caribbean highlight or any country to zoom. Click ocean to reset.</p>
      </div>
    </div>
    <div class="row g-3">
      <div class="col-md-4">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h2 class="card-title h6 text-uppercase text-muted mb-2">Country Info</h2>
            <p id="country-readout" class="fw-semibold mb-2">Hover a country...</p>
            <p id="country-details" class="mb-0 small text-secondary">Move your cursor over the map to display country information here.</p>
          </div>
        </div>
      </div>
      <div class="col-md-8">
        <div class="card shadow-sm h-100 map-card">
          <div class="card-body p-0 map-object-wrap">
            <object id="map-object" data="images/SVG/americas-political.svg" type="image/svg+xml" aria-label="Americas map"></object>
            <div id="map-corner-photos" class="map-corner-photos" aria-hidden="true">
              <div class="corner-slot corner-slot--tl" data-corner="top-left"></div>
              <div class="corner-slot corner-slot--tr" data-corner="top-right"></div>
              <div class="corner-slot corner-slot--bl" data-corner="bottom-left"></div>
              <div class="corner-slot corner-slot--br" data-corner="bottom-right"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var map = SvgPoliticalMap.createController({
        detailsBase: "data/americas-map",
        detailsSubdir: "country-details",
        readoutEl: document.getElementById("country-readout"),
        detailsEl: document.getElementById("country-details"),
        objectEl: document.getElementById("map-object"),
        svgFetchUrl: "images/SVG/americas-political.svg",
        cornerOverlayId: "map-corner-photos",
        regionClass: "country",
        hotspotSelector: "#caribbean-hotspot",
        hotspotZoomId: "caribbean",
        strings: {
          emptyHoverTitle: "Hover a country...",
          emptyHoverDetails: "Move your cursor over the map to display country information here.",
          regionHoverTitlePrefix: "Country:",
          noRegionsMessage: "No country paths in SVG.",
        },
      });
      map.startObjectEmbed();
    })();
  </script>
</body>
</html>
