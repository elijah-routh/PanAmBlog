<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Americas Hover Map</title>
  <style>
    :root { color-scheme: light; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f7fb; color: #162238; }
    .page { max-width: 1300px; margin: 24px auto; padding: 0 16px 24px; }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    .note { margin: 0 0 16px; color: #415171; }
    .split { display: grid; grid-template-columns: minmax(260px, 360px) 1fr; gap: 16px; align-items: stretch; }
    .info-wrap { border: 1px solid #d6deeb; border-radius: 12px; background: #fff; box-shadow: 0 8px 20px rgba(14, 37, 79, 0.08); padding: 16px; }
    .info-label { margin: 0 0 8px; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.02em; text-transform: uppercase; color: #415171; }
    #country-readout { min-height: 1.5rem; margin: 0 0 12px; font-weight: 600; font-size: 1.05rem; }
    #country-details { margin: 0; line-height: 1.45; color: #2e3f60; }
    .map-wrap { border: 1px solid #d6deeb; border-radius: 12px; overflow: hidden; background: #fff; box-shadow: 0 8px 20px rgba(14, 37, 79, 0.08); }
    #map-object { display: block; width: 100%; height: 78vh; min-height: 560px; border: 0; background: #fff; }
    @media (max-width: 900px) { .split { grid-template-columns: 1fr; } #map-object { height: 64vh; min-height: 460px; } }
  </style>
</head>
<body>
  <main class="page">
    <h1>Americas Map</h1>
    <p class="note">Click anywhere in the Caribbean area (no outline) or a country to zoom. Click ocean to zoom out.</p>
    <div class="split">
      <aside class="info-wrap" aria-live="polite">
        <p class="info-label">Country Info</p>
        <p id="country-readout">Hover a country...</p>
        <p id="country-details">Move your cursor over the map to display country information here.</p>
      </aside>
      <div class="map-wrap">
        <object id="map-object" data="images/americas-political.svg" type="image/svg+xml" aria-label="Americas map"></object>
      </div>
    </div>
  </main>
  <script>
    const mapObject = document.getElementById("map-object");
    const readout = document.getElementById("country-readout");
    const details = document.getElementById("country-details");

    function enhanceSvg(svgRoot) {
      let selectedZoomId = null;
      const vb = svgRoot.viewBox.baseVal;
      const baseViewBox = { x: vb.x, y: vb.y, width: vb.width, height: vb.height };

      function setViewBox(box) {
        svgRoot.setAttribute("viewBox", box.x.toFixed(3) + " " + box.y.toFixed(3) + " " + box.width.toFixed(3) + " " + box.height.toFixed(3));
      }
      function animateViewBox(target, duration) {
        duration = duration || 280;
        const s = svgRoot.viewBox.baseVal;
        const from = { x: s.x, y: s.y, width: s.width, height: s.height };
        const t0 = performance.now();
        function step(ts) {
          const t = Math.min(1, (ts - t0) / duration);
          const e = 1 - Math.pow(1 - t, 3);
          setViewBox({
            x: from.x + (target.x - from.x) * e,
            y: from.y + (target.y - from.y) * e,
            width: from.width + (target.width - from.width) * e,
            height: from.height + (target.height - from.height) * e
          });
          if (t < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }
      function fitAspect(box) {
        var r = baseViewBox.width / baseViewBox.height;
        var br = box.width / box.height;
        if (br > r) {
          var need = box.width / r;
          var g = need - box.height;
          box.y -= g / 2;
          box.height = need;
        } else {
          var need2 = box.height * r;
          var g2 = need2 - box.width;
          box.x -= g2 / 2;
          box.width = need2;
        }
        return box;
      }
      /** pad: inset around bbox in SVG units. tighten: multiply viewBox size by this (smaller = zoom in more). */
      function zoomToElement(el, pad, tighten) {
        var b = el.getBBox();
        var p = pad == null ? 24 : pad;
        var box = fitAspect({ x: b.x - p, y: b.y - p, width: b.width + p * 2, height: b.height + p * 2 });
        var t = tighten == null ? 1 : tighten;
        if (t < 1 && t > 0) {
          var cx = box.x + box.width / 2;
          var cy = box.y + box.height / 2;
          box.width *= t;
          box.height *= t;
          box.x = cx - box.width / 2;
          box.y = cy - box.height / 2;
        }
        animateViewBox(box);
      }

      var hotspot = svgRoot.querySelector("#caribbean-hotspot");
      function hotspotPointer(on) {
        if (hotspot) hotspot.setAttribute("pointer-events", on ? "all" : "none");
      }
      function resetZoom() {
        selectedZoomId = null;
        svgRoot.querySelectorAll(".country.is-selected").forEach(function (n) { n.classList.remove("is-selected"); });
        if (hotspot) hotspot.classList.remove("is-selected");
        hotspotPointer(true);
        animateViewBox(baseViewBox);
      }

      var st = svgRoot.ownerDocument.createElementNS("http://www.w3.org/2000/svg", "style");
      st.textContent = ".country{transition:fill 120ms,stroke-width 120ms;cursor:pointer}" +
        ".country-us-subregion[data-subregion=contiguous]{fill:#9fb8d1!important}" +
        ".country-us-subregion[data-subregion=alaska]{fill:#9fd1b6!important}" +
        ".country-us-subregion[data-subregion=hawaii]{fill:#d4b7e8!important}" +
        ".country:hover,.country.is-hovered{fill:#ffb347!important;stroke:#1e2a44!important;stroke-width:1.4!important}" +
        ".country.is-selected{fill:#ff9a2f!important;stroke:#0e1a2e!important;stroke-width:1.6!important}";
      svgRoot.appendChild(st);

      if (hotspot) {
        hotspot.addEventListener("mouseenter", function () {
          if (selectedZoomId) return;
          readout.textContent = "Caribbean region";
          details.textContent = "Click to zoom (same image, viewBox only).";
        });
        hotspot.addEventListener("mouseleave", function () {
          if (selectedZoomId) return;
          readout.textContent = "Hover a country...";
          details.textContent = "Move your cursor over the map.";
        });
        hotspot.addEventListener("click", function (ev) {
          ev.stopPropagation();
          if (selectedZoomId === "caribbean") {
            readout.textContent = "Hover a country...";
            details.textContent = "Move your cursor over the map.";
            resetZoom();
            return;
          }
          selectedZoomId = "caribbean";
          svgRoot.querySelectorAll(".country.is-selected").forEach(function (n) { n.classList.remove("is-selected"); });
          hotspot.classList.add("is-selected");
          zoomToElement(hotspot, 42, 0.55);
          hotspotPointer(false);
          readout.textContent = "Caribbean (zoomed)";
          details.textContent = "Hover or click countries and islands. Click ocean to zoom out.";
        });
      }

      var countries = svgRoot.querySelectorAll(".country");
      if (!countries.length) {
        readout.textContent = "No country paths in SVG.";
        return;
      }
      countries.forEach(function (c) {
        c.addEventListener("mouseenter", function () {
          c.classList.add("is-hovered");
          var name = c.getAttribute("data-name") || c.id || "?";
          var sub = c.getAttribute("data-subregion");
          readout.textContent = "Country: " + name;
          details.textContent = sub ? "ID: " + (c.id || "N/A") + " | " + name + " | US: " + sub : "ID: " + (c.id || "N/A") + " | " + name;
        });
        c.addEventListener("mouseleave", function () {
          c.classList.remove("is-hovered");
          if (!selectedZoomId) {
            readout.textContent = "Hover a country...";
            details.textContent = "Move your cursor over the map.";
          }
        });
        c.addEventListener("click", function (ev) {
          ev.stopPropagation();
          if (selectedZoomId === c.id) {
            readout.textContent = "Hover a country...";
            details.textContent = "Move your cursor over the map.";
            resetZoom();
            return;
          }
          selectedZoomId = c.id;
          svgRoot.querySelectorAll(".country.is-selected").forEach(function (n) { n.classList.remove("is-selected"); });
          c.classList.add("is-selected");
          if (hotspot) {
            hotspot.classList.remove("is-selected");
            hotspotPointer(true);
          }
          zoomToElement(c, 24);
          var name = c.getAttribute("data-name") || c.id || "?";
          readout.textContent = "Country: " + name;
          details.textContent = "Click again to reset zoom.";
        });
      });

      svgRoot.addEventListener("click", function (ev) {
        if (ev.target.closest && ev.target.closest(".map-hotspot")) return;
        if (!ev.target.closest || !ev.target.closest(".country")) {
          readout.textContent = "Hover a country...";
          details.textContent = "Move your cursor over the map.";
          resetZoom();
        }
      });
      readout.textContent = "Hover a country...";
      details.textContent = "Move your cursor over the map.";
    }

    async function inlineFallback() {
      try {
        var r = await fetch("images/americas-political.svg", { cache: "no-store" });
        if (!r.ok) throw new Error(String(r.status));
        var wrap = mapObject.parentElement;
        wrap.innerHTML = '<div id="inline-svg" style="width:100%;height:78vh;min-height:560px">' + (await r.text()) + "</div>";
        var root = wrap.querySelector("svg");
        if (!root) throw new Error("no svg");
        root.setAttribute("width", "100%");
        root.setAttribute("height", "100%");
        root.setAttribute("preserveAspectRatio", "xMidYMid meet");
        enhanceSvg(root);
      } catch (e) {
        readout.textContent = "Serve over http:// (not file://) for map interactivity.";
      }
    }

    if (location.protocol === "file:") {
      readout.textContent = "Use a local server: python3 -m http.server 8000";
    }
    mapObject.addEventListener("load", function () {
      var root = mapObject.contentDocument && mapObject.contentDocument.documentElement;
      if (!root) { inlineFallback(); return; }
      enhanceSvg(root);
    });
    mapObject.addEventListener("error", inlineFallback);
  </script>
</body>
</html>
