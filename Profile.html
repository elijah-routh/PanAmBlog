<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/grid.css"/>
  <link rel="stylesheet" href="css/bootstrap-grid.css"/>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/svg-political-map.js"></script>
  <style>
    /* Stylized ocean: full-page depth gradient + soft light + faint wave bands */
    body.profile-page {
      margin: 0;
      min-height: 100vh;
      color: #0f172a;
      background-color: #2c5f72;
      background-image:
        repeating-linear-gradient(
          100deg,
          transparent 0,
          transparent 14px,
          rgba(255, 255, 255, 0.028) 14px,
          rgba(255, 255, 255, 0.028) 28px
        ),
        radial-gradient(ellipse 100% 70% at 50% -15%, rgba(186, 230, 253, 0.55), transparent 58%),
        radial-gradient(ellipse 55% 45% at 95% 35%, rgba(125, 211, 252, 0.18), transparent 52%),
        radial-gradient(ellipse 50% 40% at 8% 65%, rgba(34, 120, 150, 0.35), transparent 50%),
        radial-gradient(ellipse 70% 55% at 50% 110%, rgba(15, 45, 62, 0.45), transparent 55%),
        linear-gradient(
          168deg,
          #9ecdd8 0%,
          #6eb0c4 18%,
          #4a8fa8 42%,
          #357891 62%,
          #2a5f72 82%,
          #1e4a5c 100%
        );
      background-attachment: fixed;
    }
    @media (prefers-reduced-motion: reduce) {
      body.profile-page { background-attachment: scroll; }
    }
    .profile-page .page-hero h1 {
      color: #f0f9fc;
      text-shadow: 0 1px 3px rgba(15, 23, 42, 0.35);
      letter-spacing: -0.02em;
    }
    .profile-page .page-hero .hero-lead {
      color: rgba(240, 249, 252, 0.88) !important;
      text-shadow: 0 1px 2px rgba(15, 23, 42, 0.2);
    }
    .profile-page .panel-card {
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 8px 32px rgba(15, 45, 62, 0.12), 0 2px 8px rgba(15, 45, 62, 0.06);
    }
    .navbar-brand img {
        height: 40px;   /* adjust as needed */
        width: auto;    /* keeps original proportions */
    }
    .map-object-wrap {
      position: relative;
    }
    .map-object-wrap object,
    .map-object-wrap #inline-svg {
      display: block;
      width: 100%;
      height: 78vh;
      min-height: 560px;
      border: 0;
      background: #fff;
    }
    @media (max-width: 900px) {
      .map-object-wrap object,
      .map-object-wrap #inline-svg { height: 64vh; min-height: 460px; }
    }
    .map-corner-photos {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }
    .corner-slot {
      position: absolute;
      width: 120px;
      height: 90px;
      overflow: hidden;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.2);
      background: rgba(255, 255, 255, 0.85);
    }
    .corner-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .corner-slot--tl { top: 8px; left: 8px; }
    .corner-slot--tr { top: 8px; right: 8px; }
    .corner-slot--bl { bottom: 8px; left: 8px; }
    .corner-slot--br { bottom: 8px; right: 8px; }
  </style>
</head>
<body class="profile-page">
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: rgba(15,45,62,0.85); backdrop-filter: blur(6px);">
        <div class="container">
            
            <!-- Logo + Brand -->
            <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="images/Icons/Crayon-Earth-pin.png" alt="Logo" class="me-2">
            <span>My Profile</span>
            </a>

            <!-- Mobile Toggle -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Nav Links -->
            <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                <a class="nav-link" href="/index.html">Map</a>
                </li>
                <li class="nav-item">
                <a class="nav-link active" href="#">Profile</a>
                </li>
                <li class="nav-item">
                <a class="nav-link" href="#">Settings</a>
                </li>
            </ul>
            </div>

        </div>
    </nav>
  <div class="container py-4">
    <div class="row mb-3 page-hero">
      <div class="col">
        <h1 class="h3 mb-1">Profile</h1>
        <p class="text-muted small mb-0 hero-lead">Customize Your Page.</p>
      </div>
    </div>
    <div class="row g-3">
      <div class="col-md-4">
        <div class="card shadow-sm h-100 panel-card">
          <div class="card-body">
            <h2 class="card-title h6 text-uppercase text-muted mb-2">Profile Info</h2>
            <p id="country-readout" class="fw-semibold mb-2">Profile Stats ...
                States ...
                National Parks/Forests ...
                Countries ...
            </p>
          </div>
        </div>
      </div>
      <div class="col-md-8">
        
      </div>
    </div>
  </div>

  <script>
    
  </script>
  
</body>
</html>
